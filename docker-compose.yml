version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.2
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ocean_network

  kafka:
    image: confluentinc/cp-kafka:7.3.2
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - ocean_network

  postgres:
    image: postgis/postgis:15-3.3
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oceandb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ocean_network

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    ports:
      - "5433:5432" # Exposing on 5433 to avoid conflict with primary PostgreSQL
    environment:
      POSTGRES_DB: ${TIMESCALEDB_DB:-ocean_timeseries}
      POSTGRES_USER: ${TIMESCALEDB_USER:-postgres}
      POSTGRES_PASSWORD: ${TIMESCALEDB_PASSWORD:-password}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    networks:
      - ocean_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - ocean_network

  api-gateway:
    build:
      context: ./api-gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_HOST=postgres
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-password}
      - DB_NAME=${POSTGRES_DB:-oceandb}
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKER=kafka:29092
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - ocean_network

  nlp-service:
    build:
      context: ./nlp-service
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BROKER=kafka:29092
    depends_on:
      - kafka
    networks:
      - ocean_network

  pipeline-service:
    build:
      context: ./pipeline-service
    environment:
      - KAFKA_BROKER=kafka:29092
      - TIMESCALEDB_HOST=timescaledb
      - TIMESCALEDB_USER=${TIMESCALEDB_USER:-postgres}
      - TIMESCALEDB_PASSWORD=${TIMESCALEDB_PASSWORD:-password}
      - TIMESCALEDB_DB=${TIMESCALEDB_DB:-ocean_timeseries}
    depends_on:
      - kafka
      - timescaledb
    networks:
      - ocean_network

  alert-service:
    build:
      context: ./alert-service
    environment:
      - KAFKA_BROKER=kafka:29092
      - DB_HOST=postgres
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-password}
      - DB_NAME=${POSTGRES_DB:-oceandb}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - FIREBASE_SERVER_KEY=${FIREBASE_SERVER_KEY}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    depends_on:
      - kafka
      - postgres
    networks:
      - ocean_network

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    networks:
      - ocean_network

networks:
  ocean_network:
    driver: bridge

volumes:
  postgres_data:
  timescaledb_data:
